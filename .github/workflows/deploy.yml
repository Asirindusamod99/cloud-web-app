name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Test Django Backend
  # ─────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend (Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: notesdb_test
          POSTGRES_USER: notesuser
          POSTGRES_PASSWORD: notespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run Django checks & migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://notesuser:notespassword@localhost:5432/notesdb_test
          DJANGO_SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
          ALLOWED_HOSTS: localhost
        run: |
          python manage.py check
          python manage.py migrate --run-syncdb

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Test React Frontend
  # ─────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend (React/Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend (Vite)
        working-directory: ./frontend
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy to EC2 (only on push to main, after tests pass)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo ">>> Navigating to project directory"
            cd ~/cloud-web-app

            echo ">>> Pulling latest code"
            git pull origin main

            echo ">>> Writing .env file from GitHub Secrets"
            cat > .env <<EOF
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DEBUG=False
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_STORAGE_BUCKET_NAME=${{ secrets.AWS_STORAGE_BUCKET_NAME }}
            AWS_S3_REGION_NAME=${{ secrets.AWS_S3_REGION_NAME }}
            EOF

            echo ">>> Rebuilding and restarting containers"
            sudo docker-compose down
            sudo docker-compose up --build -d

            echo ">>> Cleaning up unused Docker resources"
            sudo docker system prune -f

            echo ">>> Deployment complete!"
